<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéCart</title>
    <link rel="stylesheet" href="stylesheet.css">
    <script src="app.js" defer></script>
</head>

<body>

  <!-- Header -->
  <header>
    <div class="logo-wrap" onclick="switchView('shop')" title="Back to shop">
      <img src="images/pokeball-logo.png" alt="Logo" class="logo-img" />
      <span class="logo">PokéCart</span>
    </div>
    <nav>
      <button class="nav-btn cart-nav-btn" onclick="switchView('cart')">
        🛒 <span id="cartCount">0</span>
      </button>
    </nav>
  </header>

  <main>

    <!-- Shop  -->
    <div class="view active" id="view-shop">

      <div class="page-header">
        <h1>Products</h1>
      </div>

      <div class="toolbar">
        <input type="text" id="searchInput" placeholder="Search products…" oninput="renderProducts()" />
        <div class="filter-chips" id="filterChips"></div>
      </div>

      <div class="products-grid" id="productsGrid"></div>
    </div>

    <!-- Cart View -->
    <div class="view" id="view-cart">
      <div class="page-header">
        <h1>Your Cart <span class="muted" id="cartItemCount"></span></h1>
        <button class="btn-secondary" onclick="switchView('shop')">← Continue Shopping</button>
      </div>
      <div class="cart-layout">
        <div id="cartItems"></div>
        <div id="orderSummary"></div>
      </div>
    </div>

    <div class="view" id="view-success">
      <div class="success-box">
        <div class="success-icon">✓</div>
        <h2>Order Placed!</h2>
        <p>Thanks for your purchase. Your products are on their way!</p>
        <button class="btn-primary" onclick="clearCartAndReturn()">Back to Shop</button>
      </div>
    </div>

  </main>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- Background Music -->
  <audio id="background_music" loop>
    <source src="audio/pokemart.mp3" type="audio/mpeg">
  </audio>

  <div class="music-player" onclick="toggleMusic()" title="Click to pause/play">
    <div class="record-label">🎵</div>
  </div>

</body>
</html>

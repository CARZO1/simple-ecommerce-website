<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéCart</title>
    <link rel="stylesheet" href="stylesheet.css">
    <script src="app.js" defer></script>
</head>

<body>

  <!-- Header -->
  <header>
    <div class="logo-wrap" onclick="switchView('shop')" title="Back to shop">
      <img src="images/pokeball-logo.png" alt="Logo" class="logo-img" />
      <span class="logo">PokéCart</span>
    </div>
    <nav>
      <span id="navUsername"></span>
      <button class="nav-btn" id="navLoginBtn" onclick="switchView('login')">Login</button>
      <button class="nav-btn" id="navAdminBtn" style="display:none;" onclick="switchView('admin')">Admin</button>
      <button class="nav-btn" id="navOrdersBtn" style="display:none;" onclick="switchView('orders')">My Orders</button>
      <button class="nav-btn" id="navLogoutBtn" style="display:none;" onclick="logout()">Logout</button>
      <button class="nav-btn cart-nav-btn" onclick="switchView('cart')">
        🛒 <span id="cartCount">0</span>
      </button>
    </nav>
  </header>

  <main>

    <!-- Shop  -->
    <div class="view active" id="view-shop">

      <div class="page-header">
        <h1>Products</h1>
      </div>

      <div class="toolbar">
        <input type="text" id="searchInput" placeholder="Search products…" oninput="renderProducts()" />
        <div class="filter-chips" id="filterChips"></div>
      </div>

      <div class="products-grid" id="productsGrid"></div>
    </div>

    <!-- Cart View -->
    <div class="view" id="view-cart">
      <div class="page-header">
        <h1>Your Cart <span class="muted" id="cartItemCount"></span></h1>
        <button class="btn-secondary" onclick="switchView('shop')">← Continue Shopping</button>
      </div>
      <div class="cart-layout">
        <div id="cartItems"></div>
        <div id="orderSummary"></div>
      </div>
    </div>

    <div class="view" id="view-success">
      <div class="success-box">
        <div class="success-icon">✓</div>
        <h2>Order Placed!</h2>
        <p>Thanks for your purchase. Your products are on their way!</p>
        <button class="btn-primary" onclick="clearCartAndReturn()">Back to Shop</button>
      </div>
    </div>

      <!-- Login View -->
    <div class="view" id="view-login">
      <div class="auth-box">
        <h2>Login</h2>
        <div class="form-group">
          <label>Email</label>
          <input class="form-input" id="loginEmail" type="email" placeholder="pikachu@gmail.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input class="form-input" id="loginPassword" type="password" placeholder="••••••••" />
        </div>
        <button class="btn-primary" onclick="login()">Login</button>
        <p class="auth-switch">Don't have an account? <span onclick="switchView('register')">Register</span></p>
      </div>
    </div>

    <!-- Admin View -->
    <div class="view" id="view-admin">
      <div class="page-header">
        <h1>Admin Panel</h1>
      </div>
      <div class="admin-tabs" id="adminTabs">
        <button class="admin-tab active" data-tab="orders" onclick="showAdminTab('orders')">Orders</button>
        <button class="admin-tab" data-tab="users" onclick="showAdminTab('users')">Users</button>
        <button class="admin-tab" data-tab="carts" onclick="showAdminTab('carts')">Carts</button>
        <button class="admin-tab" data-tab="products" onclick="showAdminTab('products')">Products</button>
      </div>
      <div id="adminTabContent"></div>
    </div>

    <!-- Orders View -->
    <div class="view" id="view-orders">
      <div class="page-header">
        <h1>My Orders</h1>
        <button class="btn-secondary" onclick="switchView('shop')">← Continue Shopping</button>
      </div>
      <div id="ordersList"></div>
    </div>

    <!-- Register View -->
    <div class="view" id="view-register">
      <div class="auth-box">
        <h2>Register</h2>
        <div class="form-group">
          <label>Username</label>
          <input class="form-input" id="registerUsername" placeholder="Username" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input class="form-input" id="registerEmail" type="email" placeholder="pikachu@gmail.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input class="form-input" id="registerPassword" type="password" placeholder="••••••••" />
        </div>
        <button class="btn-primary" onclick="register()">Register</button>
        <p class="auth-switch">Already have an account? <span onclick="switchView('login')">Login</span></p>
      </div>
    </div>

  </main>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- Background Music -->
  <audio id="background_music" loop>
    <source src="audio/pokemart.mp3" type="audio/mpeg">
  </audio>

  <div class="music-player" onclick="toggleMusic()" title="Click to pause/play">
    <div class="record-label">🎵</div>
  </div>

</body>
</html>
